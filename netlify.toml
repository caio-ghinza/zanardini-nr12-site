[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://nirmxgnjqwobapuudvog.supabase.co; connect-src 'self' https://nirmxgnjqwobapuudvog.supabase.co"

[build]
  command = "npm run build"
  publish = "dist"

# Configurar variáveis de ambiente no Netlify (Environment Variables):
# VITE_SUPABASE_URL = "https://nirmxgnjqwobapuudvog.supabase.co"
# VITE_SUPABASE_ANON_KEY = "sua-chave-anon-aqui"
# NUNCA insira chaves de service_role aqui.
